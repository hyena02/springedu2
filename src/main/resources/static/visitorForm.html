<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>방명록작성</title>
    <link rel="stylesheet" href="css/visitor.css">
</head>
<body>
    <h2 class="tit">글 남겨줘</h2>
    <hr>
    <form class="frm" action="/vinsert" method="post">
        <input class="inp" type="text" name="name" placeholder="이름을 입력하세요" required /><br>
        <textarea class="txt" name="memo" rows="10" cols="35"
                  placeholder="내용을 입력하세요" required></textarea><br>
        <input class="btn" type="submit" value="등록">
        <input class="btn" type="reset" value="재작성">
        <input class="btn" type="button" value="취소"
               onclick="location.href='visitorMain.html'">
    </form>
</body>
</html>
